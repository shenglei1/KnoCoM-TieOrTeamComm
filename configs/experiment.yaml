memo: defalut
total_epoches: 1000 #number of training epochs
epoch_size: 2 #number of update iterations in an epoch = How many processes to run
use_multiprocessing: False #use multiprocessing to parallelize the process
n_processes: 8 #number of processes to use for training

#grad_norm_clip: 10 # Reduce magnitude of gradients above this L2 norm
use_cuda: False # Use GPU

normalize_rewards: True
normalize_advantages: False

gamma: 0.9
lr: 0.001 #learning rate
value_coeff: 0.01 #coeff for value loss term in the loss function
vib_coeff: 0.01 #coeff for vae loss term in the loss function
modularity_coeff: 10 #coeff for modularity loss term in the loss function
batch_size: 500
interval: 1  # How often to change the graph


treshold: 0.5 #threshold for the tie comm model




#baselines
use_swanlab: True
swanlab_project: 'sl1'
swanlab_api_key: 's3KnOyNpiJ8RiAjzFPDrE'  # SwanLab API Key         s3KnOyNpiJ8RiAjzFPDrE


#key_node_enhancement: 2
#key_node_scaling: 0.4
#min_key_nodes: 1
#log_key_nodes: True
#
#core_selection_method: 'original'  # 'original', 'key_node_only', or 'hybrid'
#hybrid_weight: 0.7

#gat_dropout: 0.1
#gat_heads: 1
#gat_negative_slope: 0.2

#key_node_temperature: 1.0
#use_topk_prob: 0.7
#key_node_replace: True

#add_value_last_step: True
#recurrent: True #make the model recurrent in time
#enhance_key_node_intra_obs: True



key_node_experiment:
  ablation_type: 'full'

ablation_presets:
    use_obs_enhancement:
      use_intra_key_nodes: True
      use_comm_weight_enhancement: False
      use_obs_enhancement: True
      comm_weight_enhance_factor: 0
      obs_enhance_factor: 0.05
      use_key_node_for_vib: False
      key_node_vib_weight: 0
      intra_struct_weight: 0.5
      comm_certainty_weight: 0.7
      bridge_threshold: 0.15
      key_node_threshold_factor: 1.05
      group_diversity_weight: 0.05
      pooling_mode: 'key_only'  # 'original', 'weighted', 'key_only'
      pooling_key_weight: 1.1  #
      pooling_key_only_threshold: 0.8

    key_node_only_pool:
      use_intra_key_nodes: True
      pooling_mode: 'key_only'
      pooling_key_only_threshold: 0.0
      pooling_key_weight: 1.05
      use_obs_enhancement: False
      obs_enhance_factor: 0.0
      use_comm_weight_enhancement: False
      comm_weight_enhance_factor: 0.0
      intra_struct_weight: 0.6
      key_node_threshold_factor: 1.05
      group_diversity_weight: 0.05

    intra_obs_enhance:
      use_intra_key_nodes: True
      pooling_mode: 'original'
      pooling_key_weight: 1.0
      pooling_key_only_threshold: 0.5
      use_obs_enhancement: True
      obs_enhance_factor: 0.05
      use_comm_weight_enhancement: False
      comm_weight_enhance_factor: 0.0
      intra_struct_weight: 0.6
      key_node_threshold_factor: 1.05
      group_diversity_weight: 0.05

    knocom_teamcomm:
      use_intra_key_nodes: True
      pooling_mode: 'key_only'
      pooling_key_only_threshold: 0.0
      pooling_key_weight: 1.05
      use_obs_enhancement: True
      obs_enhance_factor: 0.05
      use_comm_weight_enhancement: False
      comm_weight_enhance_factor: 0.0
      intra_struct_weight: 0.6
      key_node_threshold_factor: 1.05
      group_diversity_weight: 0.05


    baseline:
      use_intra_key_nodes: False
      pooling_mode: 'original'
      pooling_key_weight: 1.0
      pooling_key_only_threshold: 0.5
      use_obs_enhancement: False
      obs_enhance_factor: 0.0
      use_comm_weight_enhancement: False
      comm_weight_enhance_factor: 0.0
      intra_struct_weight: 0.6
      key_node_threshold_factor: 1
      group_diversity_weight: 0.05

